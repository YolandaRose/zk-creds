
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZKCreds Demo Dashboard</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f6fa;
}
header {
    background: #2f3640;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}
.container {
    display: flex;
    height: calc(100vh - 60px);
}
.panel {
    width: 60%;
    padding: 20px;
    overflow-y: auto;
}
.log {
    width: 40%;
    background: #1e272e;
    color: #00ffcc;
    padding: 15px;
    overflow-y: auto;
    font-family: monospace;
}
.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
button {
    padding: 8px 12px;
    margin-top: 8px;
    margin-right: 8px;
    cursor: pointer;
}
textarea, select {
    width: 100%;
    padding: 6px;
    margin-top: 5px;
}
.result {
    font-family: monospace;
    margin-top: 8px;
    color: #333;
    white-space: pre-wrap;
}
.warn {
    color: #c23616;
}
.ok {
    color: #009432;
}
</style>
</head>
<body>
<header>ZK Credential System - Experiment Dashboard</header>
<div class="container">
<div class="panel">
    <div class="card">
        <h3>Step 1: Input Attributes</h3>
        <textarea id="attrs" rows="4">{"age":23,"country":"CN","score":650}</textarea>
        <button onclick="commit()">Generate Commitment</button>
        <div class="result" id="commitment"></div>
    </div>

    <div class="card">
        <h3>Step 2: Issue Credential</h3>
        <button onclick="issue()">Issue Credential</button>
        <button onclick="revoke()">Issuer Revoke Credential</button>
        <div class="result" id="credential"></div>
        <div class="result" id="revokeResult"></div>
    </div>

    <div class="card">
        <h3>Step 3: Merkle Tree</h3>
        <button onclick="updateMerkle()">Update Merkle Root</button>
        <div class="result" id="root"></div>
    </div>

    <div class="card">
        <h3>Step 4: Select Auth Scenario and Generate Proof</h3>
        <select id="scenarioSelect"></select>
        <button onclick="prove()">Generate Proof (Selected Scenario)</button>
        <div class="result" id="proof"></div>
    </div>

    <div class="card">
        <h3>Step 5: Verifier Checks Proof</h3>
        <button onclick="verify()">Verify Current Proof</button>
        <div class="result" id="verifyResult"></div>
    </div>
</div>
<div class="log" id="log">[System Log]</div>
</div>

<script>
const API_ROOT = window.location.origin;

function log(msg) {
    const logBox = document.getElementById("log");
    logBox.innerHTML += "<br>> " + msg;
    logBox.scrollTop = logBox.scrollHeight;
}

function showResult(id, text, className = "") {
    const el = document.getElementById(id);
    el.className = `result ${className}`.trim();
    el.innerText = text;
}

async function post(url, data) {
    const res = await fetch(`${API_ROOT}${url}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
    });
    const result = await res.json().catch(() => ({ error: "Invalid server response" }));
    if (!res.ok) {
        throw new Error(result.error || `HTTP ${res.status}`);
    }
    return result;
}

async function get(url) {
    const res = await fetch(`${API_ROOT}${url}`);
    const result = await res.json().catch(() => ({ error: "Invalid server response" }));
    if (!res.ok) {
        throw new Error(result.error || `HTTP ${res.status}`);
    }
    return result;
}

async function loadScenarios() {
    try {
        const res = await get("/api/scenarios");
        const select = document.getElementById("scenarioSelect");
        select.innerHTML = "";
        res.scenarios.forEach((s) => {
            const option = document.createElement("option");
            option.value = s.id;
            option.textContent = `${s.id} - ${s.label}`;
            select.appendChild(option);
        });
        log(`Loaded ${res.scenarios.length} authentication scenarios`);
    } catch (err) {
        log("Load scenarios failed: " + err.message);
    }
}

async function commit() {
    try {
        const attrsInput = document.getElementById("attrs").value.trim();
        const attrs = attrsInput ? JSON.parse(attrsInput) : {};
        const res = await post("/api/commit", { attrs });
        showResult("commitment", `Commitment: ${res.commitment}`, "ok");
        showResult("credential", "");
        showResult("proof", "");
        showResult("verifyResult", "");
        showResult("revokeResult", "");
        log("Commitment generated: " + res.commitment);
    } catch (err) {
        showResult("commitment", "Error: " + err.message, "warn");
        log("Commitment failed: " + err.message);
    }
}

async function issue() {
    try {
        const res = await post("/api/issue", {});
        showResult("credential", `Credential: ${res.credential}`, "ok");
        showResult("revokeResult", "Credential active (not revoked)", "ok");
        log("Credential issued: " + res.credential);
    } catch (err) {
        showResult("credential", "Error: " + err.message, "warn");
        log("Issue failed: " + err.message);
    }
}

async function revoke() {
    try {
        const res = await post("/api/revoke", {});
        showResult("revokeResult", `${res.message}: ${res.credential}`, "warn");
        log("Issuer revoked credential: " + res.credential);
    } catch (err) {
        showResult("revokeResult", "Error: " + err.message, "warn");
        log("Revoke failed: " + err.message);
    }
}

async function updateMerkle() {
    try {
        const res = await post("/api/merkle", {});
        showResult("root", `Merkle Root: ${res.root}`, "ok");
        log("Merkle root updated: " + res.root);
    } catch (err) {
        showResult("root", "Error: " + err.message, "warn");
        log("Merkle update failed: " + err.message);
    }
}

async function prove() {
    try {
        const scenario = document.getElementById("scenarioSelect").value;
        const res = await post("/api/prove", { scenario });
        const readable = JSON.stringify(res, null, 2);
        showResult("proof", readable, "ok");
        log(`Proof generated for scenario ${res.scenario}`);
    } catch (err) {
        showResult("proof", "Error: " + err.message, "warn");
        log("Proof failed: " + err.message);
    }
}

async function verify() {
    try {
        const res = await post("/api/verify", {});
        const readable = `result=${res.result}\nreason=${res.reason}\nscenario=${res.scenario}\ncredential=${res.credential}`;
        showResult("verifyResult", readable, res.result ? "ok" : "warn");
        log(`Verification result: ${res.result} (${res.reason})`);
    } catch (err) {
        showResult("verifyResult", "Error: " + err.message, "warn");
        log("Verify failed: " + err.message);
    }
}

loadScenarios();
</script>
</body>
</html>
