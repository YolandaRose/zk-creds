
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ZKCreds 凭证演示面板</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f6fa;
}
header {
    background: #2f3640;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}
.container {
    display: flex;
    height: calc(100vh - 60px);
}
.panel {
    width: 60%;
    padding: 20px;
    overflow-y: auto;
}
.log {
    width: 40%;
    background: #1e272e;
    color: #00ffcc;
    padding: 15px;
    overflow-y: auto;
    font-family: monospace;
}
.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
button {
    padding: 8px 12px;
    margin-top: 8px;
    margin-right: 8px;
    cursor: pointer;
}
textarea, select {
    width: 100%;
    padding: 6px;
    margin-top: 5px;
}
.result {
    font-family: monospace;
    margin-top: 8px;
    color: #333;
    white-space: pre-wrap;
}
.warn {
    color: #c23616;
}
.ok {
    color: #009432;
}
</style>
</head>
<body>
<header>ZK 凭证系统 - 实验面板</header>
<div class="container">
<div class="panel">
    <div class="card">
        <h3>步骤 1：输入属性</h3>
        <textarea id="attrs" rows="14">{
  "student_name": "ZHANG_SAN",
  "employee_name": "ZHANG_SAN",
  "passport_name": "ZHANG_SAN",
  "student_school": "UESTC",
  "expected_school": "UESTC",
  "employee_company": "ALIBABA_GROUP",
  "expected_company": "ALIBABA_GROUP",
  "passport_nationality": "CHN",
  "expected_nationality": "CHN",
  "passport_dob": 20000101,
  "student_card_expiry": 20291231,
  "employee_card_expiry": 20291231,
  "passport_expiry": 20300101
}</textarea>
        <button onclick="commit()">生成承诺</button>
        <div class="result" id="commitment"></div>
    </div>

    <div class="card">
        <h3>步骤 2：签发凭证</h3>
        <button onclick="issue()">签发凭证</button>
        <button onclick="revoke()">发行方撤销凭证</button>
        <div class="result" id="credential"></div>
        <div class="result" id="revokeResult"></div>
    </div>

    <div class="card">
        <h3>步骤 3：更新 Merkle 树</h3>
        <button onclick="updateMerkle()">更新 Merkle 根</button>
        <div class="result" id="root"></div>
    </div>

    <div class="card">
        <h3>步骤 4：选择认证场景并生成证明</h3>
        <select id="scenarioSelect"></select>
        <button onclick="prove()">按当前场景生成证明</button>
        <div class="result" id="proof"></div>
    </div>

    <div class="card">
        <h3>步骤 5：验证方校验证明</h3>
        <button onclick="verify()">验证当前证明</button>
        <div class="result" id="verifyResult"></div>
    </div>
</div>
<div class="log" id="log">[System Log]</div>
</div>

<script>
const API_ROOT = window.location.origin;

function log(msg) {
    const logBox = document.getElementById("log");
    logBox.innerHTML += "<br>> " + msg;
    logBox.scrollTop = logBox.scrollHeight;
}

function showResult(id, text, className = "") {
    const el = document.getElementById(id);
    el.className = `result ${className}`.trim();
    el.innerText = text;
}

async function post(url, data) {
    const res = await fetch(`${API_ROOT}${url}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
    });
    const result = await res.json().catch(() => ({ error: "Invalid server response" }));
    if (!res.ok) {
        throw new Error(result.error || `HTTP ${res.status}`);
    }
    return result;
}

async function get(url) {
    const res = await fetch(`${API_ROOT}${url}`);
    const result = await res.json().catch(() => ({ error: "Invalid server response" }));
    if (!res.ok) {
        throw new Error(result.error || `HTTP ${res.status}`);
    }
    return result;
}

async function loadScenarios() {
    const scenarios = [
        {
            id: "student_employee",
            label: "学生-员工：校企合作",
            description: "姓名一致 + 学校/公司匹配 + 学生证/工卡有效期",
        },
        {
            id: "passport_student",
            label: "护照-学生：国际优惠",
            description: "姓名一致 + 国籍匹配 + 年龄门槛 + 护照/学生证有效期",
        },
        {
            id: "passport_employee",
            label: "护照-员工：跨境商务",
            description: "姓名一致 + 公司匹配 + 护照/工卡有效期",
        },
    ];

    const select = document.getElementById("scenarioSelect");
    select.innerHTML = "";
    scenarios.forEach((s) => {
        const option = document.createElement("option");
        option.value = s.id;
        option.textContent = `${s.label}（${s.description}）`;
        select.appendChild(option);
    });
    log(`Loaded ${scenarios.length} authentication scenarios`);
}

async function commit() {
    try {
        const attrsInput = document.getElementById("attrs").value.trim();
        const attrs = attrsInput ? JSON.parse(attrsInput) : {};
        const res = await post("/api/commit", { attrs });
        showResult("commitment", `承诺值：${res.commitment}`, "ok");
        showResult("credential", "");
        showResult("proof", "");
        showResult("verifyResult", "");
        showResult("revokeResult", "");
        log("Commitment generated: " + res.commitment);
    } catch (err) {
        showResult("commitment", "错误：" + err.message, "warn");
        log("Commitment failed: " + err.message);
    }
}

async function issue() {
    try {
        const res = await post("/api/issue", {});
        showResult("credential", `凭证：${res.credential}`, "ok");
        showResult("revokeResult", "凭证状态：有效（未撤销）", "ok");
        log("Credential issued: " + res.credential);
    } catch (err) {
        showResult("credential", "错误：" + err.message, "warn");
        log("Issue failed: " + err.message);
    }
}

async function revoke() {
    try {
        const res = await post("/api/revoke", {});
        showResult("revokeResult", `撤销结果：${res.message}（${res.credential}）`, "warn");
        log("Issuer revoked credential: " + res.credential);
    } catch (err) {
        showResult("revokeResult", "错误：" + err.message, "warn");
        log("Revoke failed: " + err.message);
    }
}

async function updateMerkle() {
    try {
        const res = await post("/api/merkle", {});
        showResult("root", `Merkle 根：${res.root}`, "ok");
        log("Merkle root updated: " + res.root);
    } catch (err) {
        showResult("root", "错误：" + err.message, "warn");
        log("Merkle update failed: " + err.message);
    }
}

async function prove() {
    try {
        const scenario = document.getElementById("scenarioSelect").value;
        const res = await post("/api/prove", { scenario });
        const readable = JSON.stringify(res, null, 2);
        showResult("proof", readable, "ok");
        log(`Proof generated for scenario ${res.scenario}`);
    } catch (err) {
        showResult("proof", "错误：" + err.message, "warn");
        log("Proof failed: " + err.message);
    }
}

async function verify() {
    try {
        const res = await post("/api/verify", {});
        const readable = `验证结果=${res.result}\n原因=${res.reason}\n场景=${res.scenario}\n凭证=${res.credential}`;
        showResult("verifyResult", readable, res.result ? "ok" : "warn");
        log(`Verification result: ${res.result} (${res.reason})`);
    } catch (err) {
        showResult("verifyResult", "错误：" + err.message, "warn");
        log("Verify failed: " + err.message);
    }
}

loadScenarios();
</script>
</body>
</html>
